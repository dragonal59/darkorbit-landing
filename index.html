    function useIntersectionObserver(threshold = 0.1) {
      const ref = useRef(null);
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          ([e]) => { if (e.isIntersecting) setVisible(true); },
          { threshold }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return [ref, visible];
    }

    function Screenshots({ t }) {
      const [ref, visible] = useIntersectionObserver();
      const [lightboxIndex, setLightboxIndex] = useState(null);
      const items = [
        { id: 'dashboard', label: t.screenshotDashboard },
        { id: 'hof', label: t.screenshotHoF },

        PICTURES_BASE + 'vitrine_image_4.png',

      const openLightbox = (index) => {
        setLightboxIndex(index);
      };

      const closeLightbox = () => {
        setLightboxIndex(null);
      };

      const showPrev = (e) => {
        e.stopPropagation();
        setLightboxIndex((prev) => {
          if (prev === null) return prev;
          return (prev + items.length - 1) % items.length;
        });
      };

      const showNext = (e) => {
        e.stopPropagation();
        setLightboxIndex((prev) => {
          if (prev === null) return prev;
          return (prev + 1) % items.length;
        });
      };

      return (
        <section ref={ref} className={`py-16 px-4 sm:px-6 ${visible ? 'fade-in visible' : 'fade-in'}`}>

                    className={`screenshot-zone screenshot-${item.id} aspect-video border border-gray-700 rounded-xl flex items-center justify-center ring-1 ring-violet/20 overflow-hidden cursor-pointer`}
                    onClick={() => openLightbox(index)}

                  className="absolute right-4 md:right-10 text-white text-3xl font-bold px-3 py-2 hover:text-gray-300"

              {!loading && entries.length === 0 && <p className="text-center text-gray-500">Aucune version.</p>}
              <div className="space-y-4">
                {entries.map((entry, i) => (
                  <button
                    key={i}
                    type="button"
                    onClick={() => setModalEntry(entry)}
                    className="w-full text-left bg-gray-800/30 border border-gray-700/50 rounded-xl p-4 hover:border-accent/40 transition flex flex-wrap items-center gap-3"
                  >
                    <span className="text-lg font-bold text-accent">v{entry.version}</span>
                    <span className="text-gray-500 text-sm">{entry.date}</span>
                    <span className={`text-xs font-semibold px-2 py-0.5 rounded ${entry.type === 'critical' ? 'bg-red-600 text-white' : 'bg-accent/80 text-white'}`}>
                      {entry.type === 'critical' ? 'CRITIQUE' : 'STANDARD'}
                    </span>
                  </button>
                ))}
              </div>
            </div>
          </section>
          {modalEntry && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 p-4" onClick={() => setModalEntry(null)}>
              <div className="bg-gray-900 border border-gray-700 rounded-xl max-w-lg w-full max-h-[85vh] overflow-auto p-6" onClick={e => e.stopPropagation()}>
                <div className="flex justify-between items-start mb-4">
                  <h3 className="text-xl font-bold text-white">Version {modalEntry.version}</h3>
                  <button type="button" onClick={() => setModalEntry(null)} className="text-gray-400 hover:text-white">Fermer</button>
                </div>
                <p className="text-gray-500 text-sm mb-4">{modalEntry.date}</p>
                {renderChanges(modalEntry)}
              </div>
            </div>
          )}
        </>
      );
    }

    function Download({ t, sectionRef, visible, currentVersion }) {
      const ver = currentVersion ? 'v' + String(currentVersion).replace(/^v/, '') : 'v2.1.0';
      return (
        <section id="download" ref={sectionRef} className={`py-20 px-4 sm:px-6 bg-gray-900/50 scroll-mt-20 ${visible ? 'fade-in visible' : 'fade-in'}`}>
          <div className="max-w-3xl mx-auto text-center">
            <h2 className="text-3xl sm:text-4xl font-bold text-white mb-4">{t.downloadTitle}</h2>
            <p className="text-gray-400 mb-8">{t.downloadSubtitle}</p>
            <a
              href={DOWNLOAD_PATH}
              download
              className="inline-block px-10 py-4 bg-accent hover:bg-accent/90 text-white text-lg font-semibold rounded-xl transition shadow-lg shadow-accent/25"
            >
              {t.download}
            </a>
            <p className="mt-4 text-sm text-gray-400">
              {t.downloadVersion} <span className="text-white font-medium">{ver}</span>
            </p>
            <p className="mt-2 text-sm text-gray-500">{t.downloadPlatform}</p>
          </div>
        </section>
      );
    }

    function Footer({ t }) {
      return (
        <footer className="py-8 px-4 sm:px-6 border-t border-gray-800">
          <div className="max-w-6xl mx-auto text-center text-sm text-gray-500">
            <p className="mb-2">{t.footerDisclaimer}</p>
            <p>© {new Date().getFullYear()} DO Stats Tracker</p>
          </div>
        </footer>
      );
    }

    function App() {
      const [lang, setLang] = useState(() => localStorage.getItem(STORAGE_KEY) || 'fr');
      const [changelogVersions, setChangelogVersions] = useState([]);
      const [changelogLoading, setChangelogLoading] = useState(true);
      const t = i18n[lang] || i18n.fr;

      useEffect(() => {
        localStorage.setItem(STORAGE_KEY, lang);
      }, [lang]);

      useEffect(() => {
        fetch(CHANGELOG_URL)
          .then(r => r.json())
          .then(data => {
            const versions = (data && data.versions) ? data.versions : [];
            setChangelogVersions(versions);
          })
          .catch(() => setChangelogVersions([]))
          .finally(() => setChangelogLoading(false));
      }, []);

      const currentVersion = changelogVersions[0] ? changelogVersions[0].version : null;
      const [heroRef, heroVisible] = useIntersectionObserver();
      const [downloadRef, downloadVisible] = useIntersectionObserver();

      return (
        <>
          <Header t={t} lang={lang} setLang={setLang} />
          <main className="min-h-screen">
            <Hero t={t} sectionRef={heroRef} visible={heroVisible} />
            <Features t={t} />
            <Screenshots t={t} />
            <ComparatifTable t={t} />
            <Changelog t={t} versions={changelogVersions} loading={changelogLoading} />
            <Download t={t} sectionRef={downloadRef} visible={downloadVisible} currentVersion={currentVersion} />
          </main>
          <Footer t={t} />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
